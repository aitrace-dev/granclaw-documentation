server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Astro outputs clean URLs as directories with index.html inside.
    # Try the exact path, then path/index.html, then 404.
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Pagefind assets — allow directory listing is not needed, just serve files
    location /pagefind/ {
        try_files $uri =404;
    }

    # Cache static assets aggressively, HTML never
    location ~* \.(js|css|woff2|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/json application/wasm;
    gzip_min_length 1024;
}
